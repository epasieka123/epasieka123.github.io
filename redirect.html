<!DOCTYPE html>
<html>
<head>
  <title>Connecting to Bahamas App...</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a1a1a;color:#fff;}
    h2{margin-bottom:8px}
    p{color:#aaa;margin-bottom:24px;text-align:center}
    a{padding:14px 28px;background:#0f6e56;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:16px}
  </style>
</head>
<body>
  <h2>✓ Google authorized</h2>
  <p>Tap the button below to return to<br>the Bahamas Rental Manager</p>
  <a id="return-btn" href="#">Return to App</a>
  <script>
    const params = window.location.search;
    const appUrl = 'com.epasi.bahamasrental://oauth2redirect' + params;
    document.getElementById('return-btn').href = appUrl;
    // Try auto-redirect after short delay
    setTimeout(() => { window.location.href = appUrl; }, 1000);
  </script>
</body>
</html>
