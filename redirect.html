<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Returning to Bahamas Rental Manager…</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f6f8fa;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
    box-sizing:border-box;
  }
  .card{
    background:#fff;
    border:1px solid #e1e6ea;
    border-radius:16px;
    padding:36px 28px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
  }
  .mark{
    width:64px;height:64px;
    border-radius:50%;
    margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
    background:#e1f5ee;color:#0f6e56;
  }
  .mark.err{background:#ffeef0;color:#c13a52;}
  h1{font-size:20px;margin:0 0 8px;color:#1c2733;}
  p{font-size:14px;color:#5b6b7a;margin:0 0 22px;line-height:1.5;}
  a.btn{
    display:inline-block;
    background:#1a6bbf;color:#fff;
    text-decoration:none;
    font-size:16px;font-weight:600;
    padding:14px 28px;border-radius:10px;
  }
  .fallback{margin-top:26px;font-size:12px;color:#8a97a3;}
  .fallback code{
    display:block;
    margin-top:8px;
    padding:10px;
    background:#f0f3f6;
    border-radius:8px;
    word-break:break-all;
    font-size:11px;
    color:#3a4a58;
    user-select:all;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="mark" id="mark">✓</div>
    <h1 id="title">Google authorized</h1>
    <p id="msg">Sending you back to the app…</p>
    <a class="btn" id="openBtn" href="#">Open Bahamas Rental Manager</a>
    <div class="fallback">
      If the app doesn't open, copy this and paste it in the app:
      <code id="urlBox"></code>
    </div>
  </div>

<script>
  var APP_SCHEME = 'com.epasi.bahamasrental://oauth2redirect';

  // Forward the ENTIRE query string (?code=...&state=...) to the app.
  var appUrl = APP_SCHEME + window.location.search;

  var params = new URLSearchParams(window.location.search);
  var error = params.get('error');
  var code = params.get('code');

  var openBtn = document.getElementById('openBtn');
  var urlBox = document.getElementById('urlBox');

  if (error) {
    // User denied access or Google returned an error — no point redirecting.
    document.getElementById('mark').textContent = '✕';
    document.getElementById('mark').className = 'mark err';
    document.getElementById('title').textContent = 'Sign-in not completed';
    document.getElementById('msg').textContent =
      'Google reported: ' + error + '. Go back to the app and try Connect again.';
    openBtn.style.display = 'none';
    document.querySelector('.fallback').style.display = 'none';
  } else if (!code) {
    document.getElementById('mark').textContent = '?';
    document.getElementById('title').textContent = 'No authorization code';
    document.getElementById('msg').textContent =
      'This page was opened without a code from Google. Start the Connect flow from the app.';
    openBtn.style.display = 'none';
    document.querySelector('.fallback').style.display = 'none';
  } else {
    // Wire up the button (user-gesture navigation always works in Chrome)
    openBtn.href = appUrl;
    urlBox.textContent = appUrl;

    // Attempt the automatic hop back into the app.
    window.location.href = appUrl;
  }
</script>
</body>
</html>
